<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Courage to Be Seen</title>
    <style>
        :root{
            --bg1:#090414;
            --bg2:#1d0f3f;
            --bg3:#3a166d;

            --glass:rgba(255,255,255,.08);
            --glass-border:rgba(255,255,255,.12);

            --white:#fff;
            --text:#f5edff;
            --muted:#d8b4fe;

            --purple:#c084fc;
            --purple2:#a855f7;
            --purple3:#7e22ce;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            -webkit-text-size-adjust:100%;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:
                max(24px, env(safe-area-inset-top))
                18px
                max(24px, env(safe-area-inset-bottom));
            overflow:hidden;

            color:var(--text);

            background:
            radial-gradient(circle at top,#5b21b644 0%,transparent 40%),
            radial-gradient(circle at bottom right,#9333ea44 0%,transparent 35%),
            linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));

            position:relative;
        }

        /* Floating blurred lights */

        body::before,
        body::after{
            content:"";
            position:absolute;
            border-radius:50%;
            filter:blur(70px);
            animation:floatBlob 12s ease-in-out infinite;
        }

        body::before{
            width:280px;
            height:280px;
            background:#c084fc33;
            top:-80px;
            left:-80px;
        }

        body::after{
            width:240px;
            height:240px;
            background:#a855f733;
            bottom:-70px;
            right:-70px;
            animation-delay:4s;
        }

        @keyframes floatBlob{

        0%,100%{
        transform:translateY(0px) translateX(0px);
        }

        50%{
        transform:translateY(40px) translateX(-20px);
        }

        }

        .courage-card{

            width:100%;
            max-width:430px;

            padding:38px 28px;

            border-radius:28px;

            background:var(--glass);

            backdrop-filter:blur(30px);
            -webkit-backdrop-filter:blur(30px);

            border:1px solid var(--glass-border);

            box-shadow:
            0 20px 60px rgba(0,0,0,.45),
            inset 0 1px 1px rgba(255,255,255,.08);

            position:relative;

            overflow:hidden;

            animation:fadeUp .8s ease;
        }

        .courage-card::before{

        content:"";

        position:absolute;

        top:0;
        left:-120%;

        width:70%;
        height:100%;

        background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.12),
        transparent);

        transform:skewX(-25deg);

        animation:shine 7s infinite;

        }

        @keyframes shine{

        100%{
        left:180%;
        }

        }

        @keyframes fadeUp{

        from{
        opacity:0;
        transform:translateY(30px);
        }

        to{
        opacity:1;
        transform:translateY(0);
        }

        }

        .icon-star{

        font-size:clamp(36px,6vw,46px);

        margin-bottom:18px;

        animation:float 4s ease infinite;

        filter:drop-shadow(0 0 15px #c084fc);

        }

        @keyframes float{

        50%{
        transform:translateY(-10px);
        }

        }

        h1{

        font-size:clamp(30px,7vw,38px);

        font-weight:700;

        background:linear-gradient(90deg,#ffffff,#d8b4fe,#ffffff);

        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;

        margin-bottom:10px;

        line-height:1.15;

        }

        .subtitle{

        font-size:12px;

        letter-spacing:4px;

        text-transform:uppercase;

        color:var(--muted);

        margin-bottom:30px;

        }

        .manifesto-container{

        text-align:left;

        padding-left:20px;

        border-left:3px solid #c084fc;

        }

        .manifesto-p{

        font-size:16px;

        line-height:1.9;

        margin-bottom:20px;

        color:#f3e8ff;

        }

        .highlight-phrase{

        font-weight:700;

        color:white;

        text-shadow:0 0 20px #d8b4fe;

        }

        .ws-button{

        margin-top:34px;

        display:flex;

        justify-content:center;

        align-items:center;

        gap:10px;

        padding:16px;

        width:100%;

        border-radius:18px;

        text-decoration:none;

        font-weight:700;

        font-size:16px;

        background:linear-gradient(
        135deg,
        #a855f7,
        #c084fc);

        color:white;

        box-shadow:
        0 10px 30px rgba(168,85,247,.45);

        transition:.35s;

        position:relative;

        overflow:hidden;

        }

        .ws-button::before{

        content:"";

        position:absolute;

        top:0;
        left:-100%;

        width:100%;
        height:100%;

        background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.4),
        transparent);

        transition:.7s;

        }

        .ws-button:hover{

        transform:translateY(-4px) scale(1.02);

        box-shadow:
        0 15px 40px rgba(192,132,252,.55);

        }

        .ws-button:hover::before{

        left:120%;

        }

        .ws-icon{

        font-size:20px;

        }

        @media(max-width:430px){

        .courage-card{

        padding:32px 22px;

        border-radius:24px;

        }

        .manifesto-p{

        font-size:15px;

        line-height:1.8;

        }

        .subtitle{

        letter-spacing:3px;

        }

        }

        .stars{
        position:absolute;
        inset:0;
        pointer-events:none;
        overflow:hidden;
        }

        .stars span{

        position:absolute;

        width:4px;
        height:4px;

        background:white;

        border-radius:50%;

        box-shadow:0 0 12px white;

        animation:twinkle 3s infinite ease-in-out;

        }

        .stars span:nth-child(1){top:15%;left:12%;}
        .stars span:nth-child(2){top:30%;right:18%;}
        .stars span:nth-child(3){bottom:22%;left:18%;}
        .stars span:nth-child(4){bottom:12%;right:10%;}
        .stars span:nth-child(5){top:60%;left:50%;}
        .stars span:nth-child(6){top:8%;right:45%;}

        @keyframes twinkle{

        0%,100%{
        opacity:.2;
        transform:scale(.8);
        }

        50%{
        opacity:1;
        transform:scale(1.8);
        }

        }
    </style>
</head>
<body>

    <div class="stars">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="courage-card">
        <div class="icon-star">✨</div>
        
        <h1>If You Ever Stay</h1>
        <div class="subtitle">30/11/2030</div>
        
        <div class="manifesto-container">
            <p class="manifesto-p">
                "This happens once every few lifetimes,<br>
                These chemicals hit me like white wine."
            </p>

            <p class="manifesto-p">
                "Cause the sign on your heart<br>
                Said it's still reserved for me.<br>
                <span class="highlight-phrase">
                    Honestly, who are we to fight the alchemy?
                </span>"
            </p>
        </div>

                <!-- Dynamic Client-Side WhatsApp Button -->
                <a id="whatsappLink" href="#" target="_blank" class="ws-button">
                    <span class="ws-icon">🔮</span> Connect on WhatsApp
                </a>
            </div>

<script>

    document.getElementById("whatsappLink").href = `https://wa.me/${yourWhatsAppNumber.replace("+","")}?text=${defaultMessage}`;</script>

</body>
</html>
