<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100svh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    background:#111827;
}

/* Background blobs */
body::before,
body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.6;
}

body::before{
    background:#ff4b7d;
    top:-100px;
    left:-100px;
}

body::after{
    background:#7c3aed;
    bottom:-100px;
    right:-100px;
}

/* Card */
.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:420px;

    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;

    padding:35px;
    text-align:center;

    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

h1{
    color:white;
}

#story{
    color:#e5e7eb;
}

button{
    border:none;
    border-radius:30px;
    padding:12px 24px;
}

#yesBtn{
    background:#ff4b7d;
    color:white;
}

#noBtn{
    background:white;
    color:#111827;
}
    
.success{
    display:none;
    margin-top:20px;
    color:#ff4b7d;
}

.rose{
    font-size:80px;
    margin-top:10px;
    animation:bloom 1s ease;
}

@keyframes bloom{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

.letter{
    display:none;
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:#fff0f5;
    color:#444;
    line-height:1.7;
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="card">

<h1>Bismillah Assalamualaikum ❤️</h1>

<div id="story"></div>

<div class="buttons" id="buttons">
    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 😢</button>
</div>

<div class="success" id="successMsg">
    <h2>Yayyyy!! 🎉❤️</h2>
    <div class="rose">🌹</div>
</div>

<div class="letter" id="letter">
    Terima kasih sebab bagi peluang dekat I ❤️

    <br><br>

    I tak janji yang I sempurna,
    tapi I janji I akan sentiasa cuba
    buat U tersenyum dan gembira 😊

    <br><br>

    Pape roro 😉
</div>

</div>

<script>

// Floating Hearts
const heartsContainer = document.getElementById("hearts");

function createHeart(){
    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*15 + 15) + "px";
    heart.style.animationDuration = (Math.random()*3 + 4) + "s";

    heartsContainer.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

setInterval(createHeart,500);


// Story Messages
const messages = [
    "Ada sesuatu yang I nak beritahu U...",
    "I dah lama simpan perasaan ini ❤️",
    "Setiap kali I bercakap dengan U...",
    "Hari I rasa lebih ceria 😊",
    "U seorang yang sangat istimewa...",
    "Dan I harap dapat kenal U dengan lebih dekat 🌹",
    "Jadi..."
];

const story = document.getElementById("story");
const buttons = document.getElementById("buttons");

let msgIndex = 0;

function showMessage(){

    if(msgIndex < messages.length){

        story.innerHTML = messages[msgIndex];
        msgIndex++;

        setTimeout(showMessage,2500);

    }else{

        story.innerHTML =
        "<strong>Would you go on a date with me? 💖</strong>";

        buttons.style.display = "block";
    }
}

showMessage();


// No Button
const noBtn = document.getElementById("noBtn");

let attempts = 0;

function moveButton(){

    attempts++;

    if(attempts === 3){
        noBtn.innerHTML = "Are you sure? 😳";
    }

    if(attempts === 6){
        noBtn.innerHTML = "Think again 🥺";
    }

    if(attempts === 10){
        noBtn.innerHTML = "Just press Yes ❤️";
    }

    noBtn.style.left = Math.random()*220 + "px";
    noBtn.style.top = Math.random()*70 + "px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);


// Yes Button
const yesBtn = document.getElementById("yesBtn");

yesBtn.addEventListener("click",()=>{

    document.getElementById("successMsg").style.display = "block";
    document.getElementById("letter").style.display = "block";

    for(let i=0;i<80;i++){

        const emoji = document.createElement("div");

        emoji.innerHTML =
        ["🎉","❤️","✨","🌹"][Math.floor(Math.random()*4)];

        emoji.style.position = "fixed";
        emoji.style.left = Math.random()*100 + "vw";
        emoji.style.top = Math.random()*100 + "vh";
        emoji.style.fontSize = "30px";

        document.body.appendChild(emoji);

        setTimeout(()=>{
            emoji.remove();
        },3000);
    }

});

</script>

</body>
</html>
