<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>One Question 💜</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body{
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #2b1055, #7597de);
        position:relative;
    }

    /* subtle animated gradient shift */
    body::before{
        content:"";
        position:absolute;
        inset:0;
        background: linear-gradient(120deg, #2b1055, #3b0764, #7597de);
        background-size: 300% 300%;
        animation: bgShift 10s ease infinite;
        opacity:0.6;
        z-index:0;
    }

    @keyframes bgShift{
        0%{background-position:0% 50%}
        50%{background-position:100% 50%}
        100%{background-position:0% 50%}
    }

    .bg-glow{
        position:absolute;
        width:100%;
        height:100%;
        overflow:hidden;
        z-index:1;
    }

    .orb{
        position:absolute;
        width:200px;
        height:200px;
        background: radial-gradient(circle, rgba(180,120,255,0.6), transparent 70%);
        border-radius:50%;
        animation: floatOrb 14s infinite ease-in-out;
        filter: blur(2px);
    }

    @keyframes floatOrb{
        0%{ transform: translateY(110vh) translateX(0) scale(0.5); }
        50%{ transform: translateY(40vh) translateX(30px) scale(1); }
        100%{ transform: translateY(-20vh) translateX(-20px) scale(0.7); }
    }

    /* floating hearts */
    .heart{
        position:absolute;
        color:rgba(255,255,255,0.8);
        font-size:18px;
        animation: floatHeart 6s linear forwards;
        z-index:1;
    }

    @keyframes floatHeart{
        0%{transform:translateY(0) scale(0.8); opacity:0}
        20%{opacity:1}
        100%{transform:translateY(-120vh) scale(1.4); opacity:0}
    }

    .card{
        position:relative;
        z-index:3;
        width:360px;
        padding:35px;
        border-radius:22px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.2);
        text-align:center;
        color:white;
        box-shadow:0 20px 60px rgba(0,0,0,0.4);
        animation: cardPulse 3s ease-in-out infinite;
    }

    @keyframes cardPulse{
        0%,100%{transform:translateY(0)}
        50%{transform:translateY(-6px)}
    }

    h1{
        font-size:22px;
        margin-bottom:10px;
        color:#e0b3ff;
    }

    p{
        font-size:15px;
        color:#ddd;
        margin-bottom:25px;
    }

    .buttons{
        position:relative;
        height:120px;
    }

    button{
        padding:12px 26px;
        border:none;
        border-radius:30px;
        cursor:pointer;
        font-size:15px;
        transition:0.3s;
        position:absolute;
    }

    #yesBtn{
        background: linear-gradient(135deg, #a855f7, #d946ef);
        color:white;
        box-shadow:0 10px 25px rgba(168,85,247,0.4);
        left:20px;
        top:20px;
        animation: glow 2s infinite;
    }

    @keyframes glow{
        0%,100%{box-shadow:0 0 15px rgba(168,85,247,0.4);}
        50%{box-shadow:0 0 30px rgba(216,70,239,0.8);}
    }

    #noBtn{
        background:#2a2a3d;
        color:#ccc;
        left:180px;
        top:60px;
        transition:0.2s;
    }

    .shake{
        animation: shake 0.3s;
    }

    @keyframes shake{
        0%{transform:translateX(0)}
        25%{transform:translateX(-5px)}
        50%{transform:translateX(5px)}
        100%{transform:translateX(0)}
    }

    .message{
        display:none;
        margin-top:20px;
        font-size:18px;
        color:#f5d0ff;
        animation: pop 0.6s ease;
    }

    @keyframes pop{
        0%{transform:scale(0)}
        80%{transform:scale(1.1)}
        100%{transform:scale(1)}
    }

</style>
</head>

<body>

<div class="bg-glow" id="bgGlow"></div>

<div class="card">
    <h1>Hey you… 💜</h1>
    <p>
        I’ve been wondering something quietly…<br>
        If I asked you out for a little moment in time,<br>
        would you say yes?
    </p>

    <div class="buttons">
        <button id="yesBtn">Yes 💜</button>
        <button id="noBtn">Not sure 😳</button>
    </div>

    <div class="message" id="msg">
        You just made my universe brighter ✨<br>
        I’ll take that as a yes 💜
    </div>
</div>

<script>
const bg = document.getElementById("bgGlow");

/* ORBS */
function createOrb(){
    const orb = document.createElement("div");
    orb.classList.add("orb");

    orb.style.left = Math.random() * 100 + "vw";
    orb.style.animationDuration = (10 + Math.random() * 8) + "s";
    orb.style.opacity = Math.random() * 0.5 + 0.3;
    orb.style.width = orb.style.height = (100 + Math.random() * 220) + "px";

    bg.appendChild(orb);
    setTimeout(() => orb.remove(), 15000);
}
setInterval(createOrb, 400);

/* HEARTS */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💜";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "100vh";

    heart.style.fontSize = (12 + Math.random() * 20) + "px";

    bg.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 600);

/* NO BUTTON ESCAPE */
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    noBtn.classList.add("shake");

    const x = Math.random() * 200;
    const y = Math.random() * 80;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    setTimeout(() => noBtn.classList.remove("shake"), 300);
});

/* YES BUTTON */
const yesBtn = document.getElementById("yesBtn");
const msg = document.getElementById("msg");

yesBtn.addEventListener("click", () => {
    msg.style.display = "block";

    // mini confetti hearts burst
    for(let i=0;i<12;i++){
        setTimeout(createHeart, i * 80);
    }

    document.body.style.background =
        "linear-gradient(135deg, #3b0764, #7c3aed, #c084fc)";
});
</script>

</body>
</html>
