<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100svh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    background:#ffb6c1;

    background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.35), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,.25), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,.25), transparent 20%),
        linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1dc);
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.heart{
    position:absolute;
    color:white;
    opacity:0.7;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh) scale(0);
    }
    to{
        transform:translateY(-20vh) scale(1.4);
    }
}

.card{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(8px);
    padding:40px 30px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:380px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
    color:#ff4b7d;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:25px;
    font-size:18px;
}

.buttons{
    position:relative;
    height:120px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

#yesBtn{
    background:#ff4b7d;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:#e5e5e5;
    position:absolute;
    left:140px;
}

.success{
    display:none;
    margin-top:20px;
    font-size:22px;
    color:#ff4b7d;
    animation:pop 0.5s ease;
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="card">
    <h1>Bismillah Assalamualaikum ❤️</h1>

    <p>Would you go on a date with me? 🌹</p>

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>

    <div class="success" id="successMsg">
        Yayyyy!! 🎉❤️<br><br>
        Hari Isnin aku ambik kau okayy 😉
    </div>
</div>

<script>
// Floating Hearts
const heartsContainer = document.getElementById("hearts");

function createHeart() {
    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 15 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";

    heartsContainer.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);
}

// Lower frequency = better performance on iPhone
setInterval(createHeart, 500);

// Runaway No Button
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("mouseover", moveButton);

function moveButton() {
    const maxX = 220;
    const maxY = 80;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

// Yes Button
const yesBtn = document.getElementById("yesBtn");
const successMsg = document.getElementById("successMsg");

yesBtn.addEventListener("click", () => {

    successMsg.style.display = "block";

    document.body.style.backgroundImage =
        "linear-gradient(135deg,#ff758c,#ff7eb3)";
});
</script>

</body>
</html>
